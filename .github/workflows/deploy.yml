name: Deploy Presentation to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: presentation/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: presentation

      - run: pnpm slidev build --base /osvdi-evaluation/
        working-directory: presentation

      - name: Copy supplementary docs into build
        run: |
          mkdir -p presentation/dist/docs
          cp report.md presentation/dist/docs/
          cp accessibility-evaluation.md presentation/dist/docs/
          cp cross-platform-strategy.md presentation/dist/docs/
          cp security-findings.md presentation/dist/docs/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: presentation/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
